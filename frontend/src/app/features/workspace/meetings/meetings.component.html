<div style="padding:32px">
  <h2 style="color:#F1F5F9;font-size:24px;font-weight:700;margin-bottom:8px">Meetings</h2>

  <p *ngIf="loading" style="color:#94A3B8">Loading meetings...</p>

  <ng-container *ngIf="!loading">
    <div *ngIf="meetings.length === 0" class="glass-card" style="padding:20px;max-width:780px">
      <p style="color:#94A3B8;margin-bottom:12px">No meetings scheduled yet.</p>
      <button
        (click)="createMeeting()"
        style="padding:10px 14px;border-radius:10px;border:none;background:linear-gradient(135deg,#6C63FF,#8B5CF6);color:#fff;font-weight:600"
      >
        Create Meeting
      </button>
    </div>

    <div *ngIf="meetings.length > 0" style="display:flex;flex-direction:column;gap:10px;max-width:780px">
      <div *ngFor="let meeting of meetings" class="glass-card" style="padding:14px">
        <h3 style="color:#F1F5F9;font-size:16px;margin-bottom:4px">{{meeting.title}}</h3>
        <p style="color:#94A3B8">{{(meeting.startsAt || meeting.startTime) | date:'medium'}}</p>
        <button
          (click)="joinMeeting(meeting.id)"
          style="margin-top:8px;padding:8px 12px;border-radius:10px;border:none;background:#22c55e;color:white;font-weight:600"
        >
          Join Meeting
        </button>
      </div>
    </div>
  </ng-container>
</div>
