<div class="login-page">
  <div class="glow glow-purple"></div>
  <div class="glow glow-cyan"></div>

  <div class="card glass-card page-enter">
    <div class="brand">
      <div class="logo">⚡</div>
      <h1>SyncSpace</h1>
      <p>Sign in to your workspace</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <div class="field">
        <label>Email Address</label>
        <div class="input-row">
          <span class="ico">✉️</span>
          <input type="email" formControlName="email" placeholder="you@company.com"/>
        </div>
        <small *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['required']">Email is required</small>
        <small *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['email']">Enter a valid email</small>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-row">
          <span class="ico">🔒</span>
          <input [type]="showPw ? 'text' : 'password'"
                 formControlName="password"
                 placeholder="Enter your password"/>
          <button type="button" class="eye" (click)="showPw=!showPw">
            {{showPw ? '🙈':'👁️'}}
          </button>
        </div>
        <small *ngIf="form.get('password')?.touched && form.get('password')?.invalid">Minimum 6 characters</small>
      </div>

      <div class="row-meta">
        <label class="check">
          <input type="checkbox" formControlName="remember"/> Remember me
        </label>
        <a routerLink="/auth/register" class="forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Sign In →</span>
        <div *ngIf="loading" class="spin"></div>
      </button>

      <div class="err" *ngIf="error">⚠️ {{error}}</div>

    </form>

    <p class="footer-link">
      No account? <a routerLink="/auth/register">Create Account</a>
    </p>
  </div>
</div>
