<div class="login-page">
  <div class="glow glow-purple"></div>
  <div class="glow glow-cyan"></div>

  <div class="card glass-card page-enter">
    <div class="brand">
      <div class="logo">⚡</div>
      <h1>Create Account</h1>
      <p>Join your SyncSpace workspace</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <div class="field">
        <label>Full Name</label>
        <div class="input-row">
          <span class="ico">👤</span>
          <input type="text" formControlName="name" placeholder="Your full name"/>
        </div>
        <small *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
          Name required (min 2 characters)
        </small>
      </div>

      <div class="field">
        <label>Email Address</label>
        <div class="input-row">
          <span class="ico">✉️</span>
          <input type="email" formControlName="email" placeholder="you@company.com"/>
        </div>
        <small *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['email']">
          Enter a valid email
        </small>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-row">
          <span class="ico">🔒</span>
          <input [type]="showPw ? 'text' : 'password'"
                 formControlName="password"
                 placeholder="Minimum 6 characters"/>
          <button type="button" class="eye" (click)="showPw=!showPw">
            {{showPw ? '🙈':'👁️'}}
          </button>
        </div>
        <small *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Minimum 6 characters
        </small>
      </div>

      <div class="field">
        <label>Role</label>
        <div class="input-row">
          <span class="ico">🎯</span>
          <select formControlName="role">
            <option value="MEMBER">Member</option>
            <option value="ADMIN">Admin</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Create Account →</span>
        <div *ngIf="loading" class="spin"></div>
      </button>

      <div class="err"     *ngIf="error">⚠️ {{error}}</div>
      <div class="success" *ngIf="success">✅ {{success}}</div>

    </form>

    <p class="footer-link">
      Already have an account? <a routerLink="/auth/login">Sign In</a>
    </p>
  </div>
</div>
