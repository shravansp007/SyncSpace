<div class="login-page">
  <div class="glow glow-purple"></div>
  <div class="glow glow-cyan"></div>

  <div class="card glass-card page-enter">
    <div class="brand">
      <div class="logo">SS</div>
      <h1>Reset Password</h1>
      <p>Generate a token and reset directly</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label>Email Address</label>
        <div class="input-row">
          <span class="ico">&#64;</span>
          <input type="email" formControlName="email" placeholder="you@company.com" />
        </div>
        <small *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['required']">
          Email is required
        </small>
        <small *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['email']">
          Enter a valid email
        </small>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Generate Token</span>
        <div *ngIf="loading" class="spin"></div>
      </button>
    </form>

    <form [formGroup]="resetForm" (ngSubmit)="resetPassword()" novalidate>
      <div class="field">
        <label>Reset Token</label>
        <div class="input-row">
          <span class="ico">#</span>
          <input type="text" formControlName="token" placeholder="paste token" />
        </div>
      </div>

      <div class="field">
        <label>New Password</label>
        <div class="input-row">
          <span class="ico">*</span>
          <input type="password" formControlName="newPassword" placeholder="new password" />
        </div>
        <small *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.errors?.['minlength']">
          Password must be at least 6 characters
        </small>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Reset Password</span>
        <div *ngIf="loading" class="spin"></div>
      </button>
    </form>

    <div class="token-box" *ngIf="generatedToken">
      Generated token: <strong>{{ generatedToken }}</strong>
    </div>
    <div class="err" *ngIf="error">Error: {{ error }}</div>
    <div class="success" *ngIf="success">Success: {{ success }}</div>

    <p class="footer-link">
      Back to <a routerLink="/auth/login">Sign In</a>
    </p>
  </div>
</div>
